<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Midnight Shelf</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/29/29302.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="simple-auth">
    <p class="brand">Midnight Shelf</p>
    <h1>Login</h1>
    <p class="page-copy">Open the catalog, add books to cart, and continue to checkout.</p>

    <form id="login-form" class="auth-form" novalidate>
      <label class="field-label" for="loginUser">Username</label>
      <input id="loginUser" name="username" autocomplete="username" placeholder="Enter your username" required>

      <label class="field-label" for="loginPass">Password</label>
      <input id="loginPass" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required>

      <button type="submit" class="primary-button">Login</button>
    </form>

    <p id="login-message" class="form-message" aria-live="polite"></p>
    <p class="switch">New here? <a href="register.html">Create account</a></p>
  </main>

  <script src="script.js"></script>
  <footer style="margin-top:2rem;padding:0.75rem 1rem;background:#f8f9fa;color:#1f2937;text-align:center;font-size:0.95rem;border-top:1px solid #e5e7eb;">Roll No: 24WH1A05T3 (h3)</footer>
</body>
</html>
